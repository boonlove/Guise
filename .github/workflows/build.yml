name: 🔨 编译 Guise

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - 'master'
    paths:
      - 'app/**'
      - 'androidc/**'
      - 'buildSrc/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - 'master'

# 同一分支/PR 只保留最新一次编译，取消之前的
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 📦 编译 APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出仓库代码
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: ☕ 配置 JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 💾 配置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v6
        with:
          # 接受使用条款以抑制缓存许可警告。
          build-scan-terms-of-use-url: 'https://gradle.com/terms-of-service'
          build-scan-terms-of-use-agree: 'yes'
          build-scan-publish: false

      - name: 🔐 配置签名信息
        env:
          SIGNING_KEY_STORE_BASE64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          mkdir -p keystore
          echo "${SIGNING_KEY_STORE_BASE64}" | base64 --decode > keystore/Guise.keystore
          echo "storeFile=keystore/Guise.keystore" > keystore.properties
          echo "keyAlias=${SIGNING_KEY_ALIAS}" >> keystore.properties
          echo "keyPassword=${SIGNING_KEY_PASSWORD}" >> keystore.properties
          echo "storePassword=${SIGNING_STORE_PASSWORD}" >> keystore.properties

      - name: 🔧 授予 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 🔨 编译 APK
        id: build
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx2048m"
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: ⬆️ 上传 arm64-v8a APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          path: app/build/outputs/apk/release/*arm64-v8a*.apk
          retention-days: 10
          archive: false
          if-no-files-found: error

      - name: ⬆️ 上传 armeabi-v7a APK
        if: success()
        uses: actions/upload-artifact@v7
        with:
          path: app/build/outputs/apk/release/*armeabi-v7a*.apk
          retention-days: 10
          archive: false
          if-no-files-found: error

      - name: 📋 上传编译日志（失败时）
        if: always() && steps.build.result == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ github.sha }}
          path: |
            app/build/outputs/
            **/build/reports/
          retention-days: 7
